<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MeetBridge – Project Ideas</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="site min-h-screen text-slate-900 flex flex-col bg-sky-100">

  <nav class="w-full bg-white shadow-sm flex justify-between items-center px-6 py-3">
    <h1 class="text-2xl font-bold text-sky-500">💡 MeetBridge Project Ideas</h1>
    <div>
      <a href="dashboard.html" class="text-sky-600 font-medium hover:text-sky-800 transition-all mr-4">🏠 Dashboard</a>
      <button id="logoutBtn" class="ml-3 bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600">Logout</button>
    </div>
  </nav>

  <div class="flex-grow flex flex-col items-center py-10 px-4">

    <section class="bg-white p-6 rounded-2xl shadow-xl w-full max-w-3xl mb-10">
      <h2 class="text-2xl font-semibold mb-4 text-center">🚀 Post Your Own Project Idea</h2>
      <div class="flex flex-col gap-4">
        <input id="projectTitle" type="text" placeholder="Project Title (e.g., AI Chat Assistant)" class="w-full p-3 rounded-lg text-gray-900 border focus:ring-2 focus:ring-sky-500 focus:outline-none">
        <textarea id="projectDescription" placeholder="Project Description (What is it? What tech does it use?)" class="w-full p-3 rounded-lg text-gray-900 border focus:ring-2 focus:ring-sky-500 focus:outline-none" rows="4"></textarea>
        
        <div>
          <label for="projectFile" class="block text-sm font-medium text-gray-700 mb-1">Attach a file (optional: PDF, ZIP, etc.)</label>
          <input id="projectFile" type="file" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-sky-50 file:text-sky-700 hover:file:bg-sky-100"/>
        </div>
        
        <button id="saveProjectBtn" class="bg-sky-500 hover:bg-sky-600 text-white font-semibold px-4 py-3 rounded-lg transition-all">
          Save Project Idea
        </button>
      </div>
    </section>

    <h2 class="text-3xl font-semibold mb-6 text-center">Explore Inspiring Project Ideas</h2>
    
    <div id="projectGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 w-full max-w-6xl">
      </div>

  </div>

  <footer class="text-center text-sm text-gray-600 py-6 bg-transparent">
    © 2025 MeetBridge • Created for Innovation 🌍
  </footer>

  <script type="module" src="firebase-config.js"></script>
  <script type="module">
    // Import auth, db, AND storage
    import { auth, db, storage } from "./firebase-config.js";
    import { signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
    import { 
      collection, addDoc, serverTimestamp, query, orderBy, onSnapshot 
    } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
    // NEW: Import storage functions
    import { 
      ref, uploadBytes, getDownloadURL 
    } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-storage.js";

    // --- Page Elements ---
    const logoutBtn = document.getElementById("logoutBtn");
    const projectTitle = document.getElementById("projectTitle");
    const projectDescription = document.getElementById("projectDescription");
    const projectFile = document.getElementById("projectFile"); // NEW
    const saveProjectBtn = document.getElementById("saveProjectBtn");
    const projectGrid = document.getElementById("projectGrid");

    const projectsRef = collection(db, "projectIdeas");
    let currentUserEmail = "";

    // --- Auth State ---
    onAuthStateChanged(auth, (user) => {
      if (user) {
        currentUserEmail = user.email;
        loadProjects();
      } else {
        window.location.href = "index.html";
      }
    });

    // --- Logout Button ---
    logoutBtn.addEventListener("click", async () => {
      await signOut(auth);
      window.location.href = "index.html";
    });

    // --- UPDATED: Save Project Logic ---
    saveProjectBtn.addEventListener("click", async () => {
      const title = projectTitle.value.trim();
      const description = projectDescription.value.trim();
      const file = projectFile.files[0]; // NEW

      if (!title || !description) {
        return alert("Please fill out both the title and description!");
      }
      
      // Disable button to prevent double-clicking
      saveProjectBtn.disabled = true;
      saveProjectBtn.textContent = "Saving...";

      try {
        let fileURL = "";
        let fileName = "";

        // Check if a file was selected
        if (file) {
          saveProjectBtn.textContent = "Uploading file...";
          // Create a storage reference
          const storageRef = ref(storage, `project-files/${Date.now()}-${file.name}`);
          
          // Upload the file
          await uploadBytes(storageRef, file);
          
          // Get the download URL
          fileURL = await getDownloadURL(storageRef);
          fileName = file.name;
        }

        // Save all data (including file URL) to Firestore
        await addDoc(projectsRef, {
          title: title,
          description: description,
          fileURL: fileURL,     // NEW
          fileName: fileName,   // NEW
          email: currentUserEmail,
          timestamp: serverTimestamp()
        });

        // Clear the form
        projectTitle.value = "";
        projectDescription.value = "";
        projectFile.value = null; // NEW
        alert("✅ Project idea posted successfully!");

      } catch (error) {
        console.error("Error adding document: ", error);
        alert("❌ Failed to post project. Please try again.");
      } finally {
        // Re-enable the button
        saveProjectBtn.disabled = false;
        saveProjectBtn.textContent = "Save Project Idea";
      }
    });

    // --- UPDATED: Load Projects Logic ---
    function loadProjects() {
      const q = query(projectsRef, orderBy("timestamp", "desc"));

      onSnapshot(q, (snapshot) => {
        projectGrid.innerHTML = ""; 
        
        if (snapshot.empty) {
          projectGrid.innerHTML = `<p class="col-span-3 text-center text-gray-500">No projects posted yet. Be the first!</p>`;
          return;
        }

        snapshot.forEach((doc) => {
          const data = doc.data();
          const card = document.createElement("div");
          card.className = "bg-white p-6 rounded-2xl shadow-xl hover:scale-1all flex flex-col justify-between";
          
          // NEW: Create a file button if a file URL exists
          const fileButton = data.fileURL 
            ? `<a href="${data.fileURL}" target="_blank" class="mt-2 text-center bg-gray-100 px-4 py-2 rounded-lg text-gray-700 hover:bg-gray-200 text-sm font-medium">Download File</a>`
            : ""; // Empty if no file

          card.innerHTML = `
            <div>
              <h3 class="text-xl font-semibold mb-2">${data.title}</h3>
              <p class="text-xs text-gray-500 mb-2">Posted by: ${data.email.split('@')[0]}</p>
              <p class="text-gray-700 text-sm mb-4">${data.description}</p>
            </div>
            <div class="flex flex-col">
              <a href="project-detail.html?id=${doc.id}" class="bg-sky-500 px-4 py-2 rounded-lg text-white hover:bg-sky-600 text-center">View Details</a>
              ${fileButton} </div>
          `;
          
          projectGrid.appendChild(card);
        });
      });
    }

  </script>
</body>
</html>
