<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale-1.0" />
  <title>MeetBridge – Matchmaking</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="site min-h-screen flex flex-col items-center text-slate-900 bg-sky-100">

  <nav class="w-full bg-white shadow-sm flex justify-between items-center px-6 py-3">
    <h1 class="text-2xl font-bold text-sky-500">🤝 MeetBridge</h1>
    <div>
      <a href="dashboard.html" class="text-sky-600 font-medium hover:text-sky-800 transition-all mr-4">🏠 Dashboard</a>
      <button id="logoutBtn" class="ml-3 bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600">Logout</button>
    </div>
  </nav>

  <section class="mt-10 bg-white p-6 rounded-2xl w-[90%] sm:w-[500px] text-center shadow-xl">
    <h2 class="text-2xl font-semibold mb-4">🔍 Find Collaborators by Interest</h2>
    <input id="searchInterest" type="text" placeholder="Enter an interest (e.g. AI, Web, Java)"
      class="w-full p-3 mb-4 rounded-lg text-black border focus:ring-2 focus:ring-sky-500 focus:outline-none" />
    <button id="findMatches" class="bg-sky-500 w-full py-3 rounded-lg hover:bg-sky-600 font-semibold text-white">
      Find Matches
    </button>
  </section>

  <section class="mt-10 bg-white shadow-xl rounded-2xl w-[90%] sm:w-[600px] p-6">
    <h2 class="text-xl font-semibold mb-4">🎯 Matching Profiles</h2>
    <ul id="matchList" class="space-y-3 text-black border rounded-xl p-4"></ul>
  </section>

  <script type="module" src="firebase-config.js"></script>
  <script type="module">
    import { auth, db } from "./firebase-config.js";
    import { signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
    import { collection, getDocs, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

    // Get DOM elements
    const searchInput = document.getElementById("searchInterest");
    const findButton = document.getElementById("findMatches");
    const matchList = document.getElementById("matchList");
    const logoutBtn = document.getElementById("logoutBtn");

    // Initialize Firebase refs
    const profilesRef = collection(db, "studentProfiles");

    // Logout handler
    logoutBtn.addEventListener("click", async () => {
        await signOut(auth);
        window.location.href = "index.html";
    });

    // Find Matches function
    const findMatches = async () => {
        const term = searchInput.value.trim().toLowerCase();
        if (!term) return alert("Please enter an interest!");
        matchList.innerHTML = "<li class='text-gray-600'>Searching...</li>";

        try {
            const snapshot = await getDocs(profilesRef);
            let found = false;
            matchList.innerHTML = "";

            snapshot.forEach((doc) => {
                const data = doc.data();
                if (data.interests && data.interests.toLowerCase().includes(term)) {
                    found = true;
                    const li = document.createElement("li");
                    li.className = "border rounded-lg p-4 bg-slate-50 shadow-sm cursor-pointer hover:shadow-md transition-all";
                    li.innerHTML = `
                        <div class="flex justify-between items-start">
                            <div>
                                <strong class="text-sky-600">${data.name}</strong><br>
                                🧠 <span class="text-gray-700">Skills:</span> ${data.skills}<br>
                                💡 <span class="text-gray-700">Interests:</span> ${data.interests}
                            </div>
                            <div class="collab-actions hidden">
                                <button class="send-collab-btn bg-sky-500 hover:bg-sky-600 text-white px-4 py-2 rounded-lg">
                                    Send Collaboration Request
                                </button>
                            </div>
                        </div>
                    `;

                    // Show/hide collaboration actions on click
                    li.addEventListener('click', function() {
                        const actions = this.querySelector('.collab-actions');
                        actions.classList.toggle('hidden');
                    });

                    // Handle send collaboration request
                    li.querySelector('.send-collab-btn').addEventListener('click', async (e) => {
                        e.stopPropagation();
                        
                        try {
                            await addDoc(collection(db, "collabRequests"), {
                                from: auth.currentUser.email,
                                to: data.email,
                                timestamp: serverTimestamp(),
                                status: 'pending'
                            });

                            const btn = e.target;
                            btn.textContent = 'Request Sent ✓';
                            btn.disabled = true;
                            btn.className = 'bg-green-500 text-white px-4 py-2 rounded-lg cursor-not-allowed';
                        } catch (error) {
                            console.error("Error sending request:", error);
                            alert("Failed to send request. Please try again.");
                        }
                    });

                    matchList.appendChild(li);
                }
            });

            if (!found) {
                matchList.innerHTML = "<li class='text-center text-gray-600'>No matches found 😢</li>";
            }
        } catch (error) {
            console.error("Error searching profiles:", error);
            matchList.innerHTML = "<li class='text-center text-red-600'>Error searching profiles. Please try again.</li>";
        }
    };

    // Add click event listener to Find Matches button
    findButton.addEventListener("click", findMatches);

    // Add enter key press listener to search input
    searchInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") {
            findMatches();
        }
    });
  </script>
</body>
</html>
