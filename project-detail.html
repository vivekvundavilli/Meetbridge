<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MeetBridge – Project Details</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="site min-h-screen text-slate-900 flex flex-col bg-sky-100">

  <nav class="w-full bg-white shadow-sm flex justify-between items-center px-6 py-3">
    <h1 class="text-2xl font-bold text-sky-500">💡 Project Details</h1>
    <div>
      <a href="project-ideas.html" class="text-sky-600 font-medium hover:text-sky-800 transition-all mr-4">← Back to Projects</a>
      <a href="dashboard.html" class="text-sky-600 font-medium hover:text-sky-800 transition-all mr-4">🏠 Dashboard</a>
    </div>
  </nav>

  <div class="flex-grow flex flex-col items-center py-10 px-4">
    <main class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-3xl">
      
      <h2 id="projectTitle" class="text-3xl font-bold mb-2 text-gray-900">
        Loading...
      </h2>
      
      <p id="projectAuthor" class="text-sm text-gray-500 mb-6">
        Posted by: ...
      </p>

      <div class="border-t pt-6">
        <h3 class="text-xl font-semibold mb-3">Project Description</h3>
        <p id="projectDescription" class="text-gray-700 whitespace-pre-wrap">
          ...
        </p>
      </div>

    </main>
  </div>

  <footer class="text-center text-sm text-gray-600 py-6 bg-transparent">
    © 2025 MeetBridge • Created for Innovation 🌍
  </footer>

  <script type="module" src="firebase-config.js"></script>
  <script type="module">
    import { auth, db } from "./firebase-config.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

    // --- Page Elements ---
    const projectTitle = document.getElementById("projectTitle");
    const projectAuthor = document.getElementById("projectAuthor");
    const projectDescription = document.getElementById("projectDescription");

    // --- Auth State ---
    onAuthStateChanged(auth, (user) => {
      if (user) {
        // User is logged in, now load the project
        loadProjectDetails();
      } else {
        window.location.href = "index.html";
      }
    });

    // --- Load Specific Project Logic ---
    async function loadProjectDetails() {
      try {
        // 1. Get the project ID from the URL
        const urlParams = new URLSearchParams(window.location.search);
        const projectId = urlParams.get('id');

        if (!projectId) {
          projectTitle.textContent = "Error";
          projectDescription.textContent = "No project ID was found in the URL.";
          return;
        }

        // 2. Create a reference to that specific document
        const docRef = doc(db, "projectIdeas", projectId);
        
        // 3. Fetch the document
        const docSnap = await getDoc(docRef);

        // 4. Check if it exists and display its data
        if (docSnap.exists()) {
          const data = docSnap.data();
          projectTitle.textContent = data.title;
          projectAuthor.textContent = `Posted by: ${data.email}`;
          projectDescription.textContent = data.description;
        } else {
          projectTitle.textContent = "Project Not Found";
          projectDescription.textContent = "This project may have been deleted.";
        }
      } catch (error) {
        console.error("Error loading project:", error);
        projectTitle.textContent = "Error";
        projectDescription.textContent = "Could not load project details.";
      }
    }
  </script>
</body>
</html>
